<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guardião da Roça</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0700;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'VT323',monospace;overflow:hidden}
#gc{position:relative;width:800px;height:560px;overflow:hidden;border:3px solid #6a4400;box-shadow:0 0 60px rgba(180,100,0,.35),0 0 120px rgba(100,50,0,.2)}
canvas{display:block;width:800px;height:560px;image-rendering:pixelated;cursor:default}

/* HUD */
#hud{position:absolute;top:0;left:0;width:100%;padding:8px 14px;display:flex;justify-content:space-between;align-items:center;pointer-events:none;z-index:4}
.hb{background:rgba(0,0,0,.75);border:1.5px solid #7a5500;border-radius:5px;padding:4px 11px;color:#ffe87a;font-size:17px;display:flex;align-items:center;gap:5px}
.hb.danger{border-color:#ff3020;animation:hbp .45s infinite alternate}
@keyframes hbp{from{box-shadow:0 0 0 rgba(255,48,32,0)}to{box-shadow:0 0 14px rgba(255,48,32,.85)}}
#ptsDisp{font-family:'Press Start 2P',monospace;font-size:9px;color:#ffd040}
#faseDisp{font-family:'Press Start 2P',monospace;font-size:8px}
.heart{font-size:19px;transition:all .2s;display:inline-block}
.heart.lost{filter:grayscale(1) brightness(.4);transform:scale(.8)}

/* ── PAINEL INFERIOR unificado ── */
#painelInf{
  position:absolute;bottom:0;left:0;width:100%;height:76px;
  background:rgba(0,0,0,.65);border-top:1.5px solid #5a3800;
  display:none;z-index:5;pointer-events:none;
  flex-direction:row;align-items:center;justify-content:space-between;
  padding:0 14px;gap:10px;box-sizing:border-box;
}
/* MODO ATIVO — esquerda */
#modoAtivo{
  font-size:12px;color:#ffe87a;background:transparent;border:none;
  padding:0;border-radius:0;pointer-events:none;display:flex;
  white-space:normal;flex:0 0 180px;font-family:'VT323',monospace;
  line-height:1.35;text-align:left;
}
/* SOLO HUD — centro */
#soloHUD{flex:1;max-width:240px;text-align:center;pointer-events:none}
#soloLabel{font-family:'Press Start 2P',monospace;font-size:6px;color:#c8a060;
  margin-bottom:4px;letter-spacing:.04em;display:block}
#soloTrack{background:rgba(0,0,0,.6);border:2px solid #7a5500;border-radius:5px;
  height:13px;overflow:hidden;position:relative}
#soloFill{height:100%;width:100%;border-radius:3px;transition:width .7s,background .7s}
#soloNum{position:absolute;right:5px;top:50%;transform:translateY(-50%);
  color:#fff;font-family:'Press Start 2P',monospace;font-size:6px}
/* BOTÕES — direita */
#btns{display:none;gap:8px;pointer-events:all;z-index:6;
  align-items:center;flex:0 0 auto}
.mbtn{border:none;border-radius:6px;font-family:'Press Start 2P',monospace;font-size:6px;
  padding:9px 14px;cursor:pointer;transition:all .15s;line-height:1.8;white-space:nowrap}
#bn{background:#1d5a0e;border:2px solid #4adf18;color:#b0ffb0}
#bn.on{background:#2a7a14;box-shadow:0 0 14px rgba(74,223,24,.6);transform:scale(1.04)}
#bn:hover:not(.on){background:#257012}
#bq{background:#6a0e0e;border:2px solid #df2818;color:#ffb0b0}
#bq.on{background:#8a1414;box-shadow:0 0 14px rgba(223,40,24,.6);transform:scale(1.04)}
#bq:hover:not(.on){background:#801212}

/* FLASH de tela */
#flash{position:absolute;inset:0;pointer-events:none;z-index:8;opacity:0;transition:opacity .05s}

/* BANNER de fase */
#fbanner{position:absolute;top:42%;left:50%;transform:translate(-50%,-50%) scale(.4);opacity:0;text-align:center;pointer-events:none;z-index:9;transition:all .38s cubic-bezier(.34,1.56,.64,1)}
#fbanner.show{transform:translate(-50%,-50%) scale(1);opacity:1}
#fbanner h2{font-family:'Press Start 2P',monospace;font-size:13px;color:#ffd040;text-shadow:0 0 20px #ff8000;margin-bottom:6px}
#fbanner p{font-size:22px;color:#c0ffa0}

/* TOAST rápido */
#toast{position:absolute;left:50%;transform:translateX(-50%);top:50px;font-size:20px;padding:5px 18px;border-radius:5px;pointer-events:none;opacity:0;transition:opacity .25s;z-index:11;white-space:nowrap;font-weight:bold;border:1.5px solid transparent}

/* POPUP educativo */
#popup{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(10,6,0,.97);border:2.5px solid #c8a000;border-radius:10px;padding:22px 32px;color:#ffe87a;text-align:center;max-width:500px;pointer-events:all;z-index:12;line-height:1.75}
#popup h2{font-family:'Press Start 2P',monospace;font-size:11px;color:#ffd040;margin-bottom:10px}
#popup p{font-size:18px;color:#e8d490;margin-bottom:16px;white-space:pre-line}
#popupBtn{background:#2a6010;border:2px solid #5adf20;color:#c0ffb0;font-family:'VT323',monospace;font-size:22px;padding:7px 30px;cursor:pointer;border-radius:5px}
#popupBtn:hover{background:#3a8018}

</style>
</head>
<body>
<div id="gc">
  <canvas id="c"></canvas>
  <div id="hud">
    <div class="hb" id="livesBox"></div>
    <div class="hb" id="faseDisp">FASE 1</div>
    <div class="hb"><span id="ptsDisp">⭐ 0</span></div>
  </div>
  <div id="flash"></div>
  <div id="fbanner"><h2 id="fbt"></h2><p id="fbs"></p></div>
  <div id="toast"></div>

  <!-- PAINEL INFERIOR: modoAtivo | soloHUD | botões — numa faixa só -->
  <div id="painelInf">
    <div id="modoAtivo"></div>
    <div id="soloHUD">
      <div id="soloLabel">🌱 SAÚDE DO SOLO</div>
      <div id="soloTrack"><div id="soloFill"></div><span id="soloNum">100%</span></div>
    </div>
    <div id="btns">
      <button class="mbtn" id="bn" onclick="setModo('natural')">
        🌿 NATURAL<br>
        <span style="font-size:5px;opacity:.85">Demora mais · +2pts · preserva o solo</span>
      </button>
      <button class="mbtn" id="bq" onclick="setModo('quimico')">
        🧪 QUÍMICO<br>
        <span style="font-size:5px;opacity:.85">Elimina rápido · +1pt · degrada o solo</span>
      </button>
    </div>
  </div>

  <div id="popup" style="display:none">
    <h2 id="popupTitle"></h2>
    <p id="popupText"></p>
    <button id="popupBtn" onclick="fecharPopup()">Continuar ▶</button>
  </div>
</div>

    o.frequency.exponentialRampToValueAtTime(f*dec,AC.currentTime+d);
    g.gain.setValueAtTime(vol,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);
    o.start();o.stop(AC.currentTime+d);
  }catch(e){}
}

// Chamado sempre que uma praga é eliminada
function registrarEliminacao(modo, x, y, ptsBase){
  if(modo==='natural'){
    G.usoNatural++;
    // solo sobe lentamente (+1 por eliminação, limitado a 100)
    G.soloSaude=Math.min(100, G.soloSaude+1);
    addFloat(x,y-20,'🌿 +2pts','#60ff40');
    addFloat(x,y-46,'Solo +1%','#40df20');
    SFX.popNat();
    return ptsBase*2;
  } else {
    G.usoQuimico++;
    // solo cai -8 por uso (impacto imediato e visível)
    G.soloSaude=Math.max(0, G.soloSaude-8);
    addFloat(x,y-20,'💨 +1pt','#ffaa30');
    addFloat(x,y-46,'Solo -8%','#ff5020');
    flash('#4a2000',.28); // flash amarronzado — veneno
    SFX.popQui();
    // aviso de solo crítico
    if(G.soloSaude<30 && !G.soloWarnJaEmitido){
      G.soloWarnJaEmitido=true;
      showToast('⚠️ SOLO CRÍTICO — pragas se multiplicam!','#ff4020','#3a0000');
      SFX.soloWarn();
    }
    // solo destruído = derrota especial
    if(G.soloSaude<=0){
      G.tela='gameover';
      G.soloDestruido=true;
      SFX.over();
      setTimeout(()=>mostrarPopup('gameover'),700);
    }
    return ptsBase*1;
  }
}

// A cada tick: se modo natural, recupera o solo muito devagar (gameloop)
function tickSolo(){
  if(G.tela!=='jogo') return;
  G.soloRecuperaT++;
  // natural: +0.5% a cada 5 segundos (300 ticks)
  if(G.modo==='natural' && G.soloRecuperaT%300===0){
    G.soloSaude=Math.min(100, G.soloSaude+0.5);
    atualizarSoloHUD();
  }
  // solo baixo → intervalo de spawn diminui (mais pragas, consequência visível)
  // isso é automático — jogador percebe sem leitura
}

// Retorna intervalo de spawn modificado pelo solo
function getSpawnInt(){
  const base=G.spawnInt;
  if(G.soloSaude<30) return Math.max(base*0.5, 18); // solo ruim: 2x mais pragas
  if(G.soloSaude<60) return Math.max(base*0.75, 28);
  if(G.soloSaude>80) return base*1.15; // solo ótimo: leve respiro
  return base;
}

function atualizarSoloHUD(){
  const s=G.soloSaude;
  const fill=document.getElementById('soloFill');
  const num=document.getElementById('soloNum');
  fill.style.width=s+'%';
  num.textContent=Math.round(s)+'%';
  // cor muda conforme saúde — verde → amarelo → vermelho
  if(s>60) fill.style.background=`hsl(${90+s*.3},80%,38%)`;
  else if(s>30) fill.style.background=`hsl(${s},80%,42%)`;
  else fill.style.background='#cc2010';
  // borda da barra pulsa vermelho quando crítico
  document.getElementById('soloTrack').style.borderColor=
    s<30?'#ff3020':s<60?'#df9020':'#7a5500';
}

function flash(c='#ff2000',a=.38){G.flashA=a;G.flashC=c;}

function addFloat(x,y,txt,cor='#80ff40'){
  G.floats.push({x,y,txt,cor,a:1,vy:-1.8,life:52});

function updDrawFloats(){
  ctx.textAlign='center';
  for(let i=G.floats.length-1;i>=0;i--){

    f.y+=f.vy; f.vy*=.94; f.a-=1/f.life; f.life--;

function updDrawParts(){

}

// FUNDO — reage ao estado do solo (mensagem visual passiva)
// ════════════════════════════════════════════════════════════════
function drawBg(){
  const t=G.tick;
  const s=G.soloSaude/100;   // 1=perfeito, 0=destruído
  const dmg=1-s;

  // CÉU: azul saudável → cinza/acastanhado com dano
  const sky=ctx.createLinearGradient(0,0,0,310);
  sky.addColorStop(0,`hsl(${210-dmg*45},${70-dmg*40}%,${64-dmg*18}%)`);
  sky.addColorStop(1,`hsl(${200-dmg*30},${60-dmg*30}%,${78-dmg*20}%)`);
  ctx.fillStyle=sky; ctx.fillRect(0,0,800,310);

  // NÉVOA de agrotóxico — aparece quando solo < 50
  if(dmg>0.5){
    const nevoaA=(dmg-0.5)*0.5;
    ctx.fillStyle=`rgba(180,140,60,${nevoaA*.6})`;
    ctx.fillRect(0,200,800,150);
  }

  // NUVENS
  [[112,56,68],[345,40,52],[622,66,62],[498,44,44]].forEach(([bx,by,bw],i)=>{
    drawNuvem(bx+Math.sin(t*.0018+i*1.3)*22, by, bw, dmg);
  });

  // COLINAS
  ctx.fillStyle=`hsl(${112-dmg*50},${55-dmg*40}%,${38-dmg*18}%)`;
  ctx.beginPath();ctx.ellipse(178,316,258,92,0,0,Math.PI);ctx.fill();
  ctx.beginPath();ctx.ellipse(622,321,275,98,0,0,Math.PI);ctx.fill();

  // SOLO — a cor é a mensagem mais direta
  // verde rico → marrom seco → acinzentado morto
  const sg=ctx.createLinearGradient(0,300,0,560);
  sg.addColorStop(0,`hsl(${28-dmg*22},${48-dmg*44}%,${27-dmg*10}%)`);
  sg.addColorStop(1,`hsl(${22-dmg*18},${38-dmg*35}%,${17-dmg*8}%)`);
  ctx.fillStyle=sg; ctx.fillRect(0,300,800,260);

  // RACHADURAS no solo quando muito degradado
  if(G.soloSaude<40){
    const crachA=Math.min(1,(40-G.soloSaude)/40)*0.6;
    ctx.strokeStyle=`rgba(60,30,10,${crachA})`;
    ctx.lineWidth=1.5;
    [[150,340,200,360],[300,355,340,380],[500,342,530,365],[620,350,660,370],
     [100,390,160,410],[420,380,450,400],[680,395,710,415]].forEach(([x1,y1,x2,y2])=>{
      ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
    });
  }

  // sulcos
  ctx.strokeStyle='rgba(0,0,0,.14)'; ctx.lineWidth=1;
  for(let y=322;y<560;y+=22){
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(800,y);ctx.stroke();
  }

  // CASAS e ÁRVORES — desenhadas ANTES dos canteiros e plantas
  // para ficarem atrás da plantação (ordem de profundidade correta)
  drawCasa(42,214); drawCasaFlip(658,218);
  drawArvore(28,268,28,s); drawArvore(752,264,25,s);

  // CERCA — também antes dos canteiros
  ctx.strokeStyle=`hsl(${25-dmg*10},${50-dmg*30}%,${30-dmg*10}%)`;
  ctx.lineWidth=2.5;
  [315,327].forEach(y=>{ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(800,y);ctx.stroke();});
  for(let x=10;x<800;x+=28){ctx.beginPath();ctx.moveTo(x,304);ctx.lineTo(x,337);ctx.stroke();}

  // CANTEIROS e PLANTAS — desenhados por cima das casas
  for(let i=0;i<4;i++){
    const bx=62+i*172,by=337,bw=150,bh=87;
    ctx.fillStyle=`hsl(${22-dmg*16},${44-dmg*34}%,${21-dmg*10}%)`;
    ctx.fillRect(bx,by,bw,bh);
    ctx.strokeStyle='rgba(0,0,0,.28)'; ctx.lineWidth=1.5; ctx.strokeRect(bx,by,bw,bh);
    for(let j=1;j<4;j++){
      ctx.beginPath();ctx.moveTo(bx,by+j*22);ctx.lineTo(bx+bw,by+j*22);ctx.stroke();
    }
    // plantas reagem ao solo
    for(let j=0;j<3;j++) drawPlanta(bx+25+j*48, by, G.vida/G.vidaMax, s);
  }
}

function drawNuvem(x,y,w,dmg=0){
  ctx.fillStyle=`rgba(${255-dmg*50},${255-dmg*60},${255-dmg*30},${.82-dmg*.3})`;
  [[0,0,1],[-.38,6,.52],[.38,6,.52]].forEach(([dx,dy,wr])=>{
    ctx.beginPath();ctx.ellipse(x+dx*w,y+dy,w*wr,21,0,0,Math.PI*2);ctx.fill();
  });
}

function drawPlanta(x,y,vida,soloS=1){
  // vida E solo afetam a planta — dupla degradação visível
  const vit=vida*soloS; // vitalidade combinada
  const h=Math.round(46*vit+6);
  ctx.fillStyle=`hsl(${88+vit*36},${vit>.5?60:24}%,${vit>.5?35:22}%)`;
  ctx.fillRect(x-2,y-h,4,h);
  if(vit>.2){
    ctx.fillStyle=`hsl(${106+vit*32},${vit>.5?65:22}%,${vit>.5?41:24}%)`;
    ctx.beginPath();ctx.ellipse(x-11,y-h*.55,13,5.5,-.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(x+11,y-h*.38,13,5.5,.5,0,Math.PI*2);ctx.fill();
    if(vit>.4){ctx.beginPath();ctx.ellipse(x-8,y-h*.76,10,4.5,-.3,0,Math.PI*2);ctx.fill();}
  }
  if(vit>.55){
    ctx.fillStyle=`hsl(${vit>.65?5:22},68%,${vit>.65?50:34}%)`;
    ctx.beginPath();ctx.arc(x,y-h-6,6.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.3)';
    ctx.beginPath();ctx.arc(x-2,y-h-8,2,0,Math.PI*2);ctx.fill();
  }
}

function drawCasa(x,y){
  ctx.fillStyle='#e0c898';ctx.fillRect(x,y,106,83);
  ctx.strokeStyle='#9a7840';ctx.lineWidth=1.5;ctx.strokeRect(x,y,106,83);
  ctx.fillStyle='#9ad0e8';ctx.fillRect(x+12,y+18,28,27);
  ctx.strokeStyle='#406070';ctx.lineWidth=1;ctx.strokeRect(x+12,y+18,28,27);
  ctx.beginPath();ctx.moveTo(x+26,y+18);ctx.lineTo(x+26,y+45);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x+12,y+31);ctx.lineTo(x+40,y+31);ctx.stroke();
  ctx.fillStyle='#6a3810';ctx.fillRect(x+68,y+46,22,37);
  ctx.beginPath();ctx.arc(x+79,y+46,11,Math.PI,0);ctx.fill();
  ctx.strokeStyle='#3a1800';ctx.lineWidth=1.2;ctx.strokeRect(x+68,y+46,22,37);
  ctx.fillStyle='#b83028';
  ctx.beginPath();ctx.moveTo(x-8,y);ctx.lineTo(x+53,y-44);ctx.lineTo(x+114,y);ctx.closePath();ctx.fill();
  ctx.strokeStyle='#782018';ctx.lineWidth=1.8;ctx.stroke();
  ctx.fillStyle='#9a7050';ctx.fillRect(x+72,y-38,12,22);
  ctx.fillStyle='#505050';ctx.fillRect(x+70,y-40,16,6);
}
function drawCasaFlip(x,y){ctx.save();ctx.translate(x+106,0);ctx.scale(-1,1);drawCasa(0,y);ctx.restore();}
function drawArvore(x,y,r,soloS=1){
  ctx.fillStyle='#5a3010';ctx.fillRect(x-4,y,8,30);
  ctx.fillStyle=`hsl(${110+soloS*30},${soloS>.5?55:25}%,${soloS>.5?28:18}%)`;
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
  if(soloS>.5){
    ctx.fillStyle=`hsl(${115+soloS*25},60%,34%)`;
    ctx.beginPath();ctx.arc(x-r*.3,y-r*.3,r*.55,0,Math.PI*2);ctx.fill();
  }
}

// ════════════════════════════════════════════════════════════════
// PRAGAS — sistema com morte lenta (natural) vs instantânea (químico)
// ════════════════════════════════════════════════════════════════
function spawnPraga(){
  const fIdx=G.fase===4?Math.floor(Math.random()*3):G.fase-1;
  const fp=FASES[fIdx].p;
  const lado=Math.floor(Math.random()*3);
  let px,py;
  if(lado===0){px=Math.random()*680+60;py=-26;}
  else if(lado===1){px=-30;py=Math.random()*190+90;}
  else{px=830;py=Math.random()*190+90;}
  const velVar=Math.random()*.4-.2;
  const vf=G.vel*(fp.velM/FASES[G.fase-1].p.velM)+velVar;
  G.pragas.push({
    x:px, y:py,
    alvo:{x:310+Math.random()*180-90, y:368+Math.random()*65-32},
    ...fp, vel:vf, fIdx,
    wPhase:Math.random()*Math.PI*2,
    delay:Math.floor(Math.random()*16),
    id:Math.random(),
    // morteProgresso: 0 a 1. Natural vai acumulando; químico = 1 imediato.
    morteProgresso:0,
    morrendo:false,
    modoMorte:null,
  });
}

function drawPraga(p){
  if(p.delay>0){p.delay--;return;}
  ctx.save();
  ctx.translate(p.x,p.y);

  // se está morrendo (natural) — pisca e encolhe
  if(p.morrendo && p.modoMorte==='natural'){
    const pulse=Math.sin(G.tick*0.35)*0.5+0.5;
    ctx.globalAlpha=0.5+pulse*0.5;
    const escala=1-p.morteProgresso*0.4;
    ctx.scale(escala,escala);
  }

  // sombra
  ctx.fillStyle='rgba(0,0,0,.2)';
  ctx.beginPath();ctx.ellipse(0,p.tam*.88,p.tam*.72,p.tam*.17,0,0,Math.PI*2);ctx.fill();
  // corpo
  ctx.fillStyle=p.cor;
  ctx.beginPath();ctx.ellipse(0,0,p.tam,p.tam*.62,0,0,Math.PI*2);ctx.fill();
  // highlight
  ctx.fillStyle=p.c3;ctx.globalAlpha=.35;
  ctx.beginPath();ctx.ellipse(-p.tam*.2,-p.tam*.24,p.tam*.48,p.tam*.2,0,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;
  // escuro
  ctx.fillStyle=p.c2;
  ctx.beginPath();ctx.ellipse(0,p.tam*.18,p.tam*.84,p.tam*.44,0,0,Math.PI*2);ctx.fill();
  // segmentos
  ctx.strokeStyle=p.c2;ctx.lineWidth=1.2;ctx.globalAlpha=.45;
  [-8,-3,3,8].forEach(dx=>{ctx.beginPath();ctx.moveTo(dx,-p.tam*.54);ctx.lineTo(dx,p.tam*.54);ctx.stroke();});
  ctx.globalAlpha=1;
  // olho
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-p.tam*.52,-p.tam*.17,4.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#111';ctx.beginPath();ctx.arc(-p.tam*.52,-p.tam*.17,2.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-p.tam*.52-1,-p.tam*.17-1,1,0,Math.PI*2);ctx.fill();
  // pernas
  ctx.strokeStyle=p.c2;ctx.lineWidth=1.8;ctx.globalAlpha=.7;
  [-10,-2,8].forEach(lx=>{
    ctx.beginPath();ctx.moveTo(lx,4);ctx.lineTo(lx-8,p.tam+4);ctx.stroke();
    ctx.beginPath();ctx.moveTo(lx,4);ctx.lineTo(lx+8,p.tam+4);ctx.stroke();
  });
  ctx.globalAlpha=1;
  ctx.restore();
}

function updPragas(){
  if(G.tela!=='jogo') return;

  // spawn com intervalo que varia conforme saúde do solo
  G.spawnT++;
  const fd=FASES[G.fase-1];
  const siAtual=getSpawnInt();
  if(G.spawnT>=siAtual && G.elimTotal<fd.meta){
    spawnPraga(); G.spawnT=0;
  }

  for(let i=G.pragas.length-1;i>=0;i--){
    const p=G.pragas[i];
    if(p.delay>0){p.delay--;continue;}

    // ── se está morrendo (natural) — progride até 1 e some ──
    if(p.morrendo){
      p.morteProgresso+=0.008; // leva ~125 ticks = ~2.1s para morrer
      if(p.morteProgresso>=1){
        // morreu de vez
        addParts(p.x,p.y,'#60ff30',14);
        const pts=registrarEliminacao('natural',p.x,p.y,fd.p.pts);
        G.pontos+=pts;
        G.elimTotal++;
        atualizarHUD();
        G.pragas.splice(i,1);
        if(G.elimTotal>=fd.meta && G.pragas.length===0) setTimeout(concluirFase,480);
      }
      continue; // praga morrendo não se move
    }

    // ── movimento normal com wobble ──
    const dx=p.alvo.x-p.x, dy=p.alvo.y-p.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>6){
      const w=Math.sin(G.tick*.08+p.wPhase)*p.wob;
      const ang=Math.atan2(dy,dx);
      p.x+=Math.cos(ang+w)*p.vel;
      p.y+=Math.sin(ang+w)*p.vel;
    } else {
      // chegou à planta — causa dano
      G.vida=Math.max(0,G.vida-1);
      addParts(p.x,p.y,'#ff4020',16);
      addFloat(p.x,p.y-22,'DANO!','#ff5030');
      shake(9,24); flash('#ff1000',.44); SFX.dano();
      atualizarHUD(); G.pragas.splice(i,1);
      if(G.vida<=0){
        G.tela='gameover'; G.soloDestruido=false;
        SFX.over(); setTimeout(()=>mostrarPopup('gameover'),700);
      }
      continue;
    }

    // ── colisão com defensivo ──
    if(G.click){
      const mdx=G.mx-p.x, mdy=G.my-p.y;
      if(Math.sqrt(mdx*mdx+mdy*mdy)<46+p.tam){
        if(G.modo==='quimico'){
          // QUÍMICO: morte instantânea + consequência imediata
          addParts(p.x,p.y,'#ffaa20',12);
          // flash químico — amarronzado, não verde
          flash('#3a1500',.22);
          const pts=registrarEliminacao('quimico',p.x,p.y,fd.p.pts);
          G.pontos+=pts;
          G.elimTotal++;
          atualizarSoloHUD(); atualizarHUD();
          G.pragas.splice(i,1);
          if(G.soloSaude>0 && G.elimTotal>=fd.meta && G.pragas.length===0) setTimeout(concluirFase,480);
        } else {
          // NATURAL: inicia processo de morte lenta (visível!)
          if(!p.morrendo){
            p.morrendo=true;
            p.modoMorte='natural';
            p.morteProgresso=0;
            // pequeno flash verde suave — vivo, não agressivo
            flash('#003300',.12);
          }
        }
      }
    }
  }
}

// ════════════════════════════════════════════════════════════════
// CURSOR
// ════════════════════════════════════════════════════════════════
function drawCursor(){
  if(G.tela!=='jogo') return;
  ctx.save(); ctx.translate(G.mx,G.my);
  const cor=G.modo==='natural'?'#70ff30':'#ff6020';

  if(G.click){
    // partículas ao redor do cursor
    const n=G.modo==='natural'?9:7;
    for(let i=0;i<n;i++){
      const a=Math.random()*Math.PI*2, rd=Math.random()*38+5;
      ctx.fillStyle=G.modo==='natural'
        ?`rgba(80,220,30,${Math.random()*.7+.2})`
        :`rgba(255,100,20,${Math.random()*.6+.15})`;
      ctx.beginPath();ctx.arc(Math.cos(a)*rd,Math.sin(a)*rd,Math.random()*3+1,0,Math.PI*2);ctx.fill();
    }
  }

  const pulse=G.click?1:.86+Math.sin(G.tick*.08)*.14;
  const r=G.click?18:14;
  ctx.strokeStyle=cor; ctx.lineWidth=2; ctx.globalAlpha=.88*pulse;
  ctx.beginPath(); ctx.arc(0,0,r+4,0,Math.PI*2); ctx.stroke();
  ctx.globalAlpha=.55; ctx.fillStyle=cor;
  ctx.beginPath(); ctx.arc(0,0,5,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=.88;
  const len=G.click?27:22;
  [[-(len+4),0,-(r+1),0],[r+1,0,len+4,0],[0,-(len+4),0,-(r+1)],[0,r+1,0,len+4]].forEach(([x1,y1,x2,y2])=>{
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  });
  ctx.globalAlpha=1; ctx.restore();
}

// ════════════════════════════════════════════════════════════════
// POPUP
// ════════════════════════════════════════════════════════════════
function mostrarPopup(tipo){
  const el=document.getElementById('popup');
  const t=document.getElementById('popupTitle');
  const tx=document.getElementById('popupText');
  const btn=document.getElementById('popupBtn');
  el.style.display='block';

  if(tipo==='fasecompleta'){
    const fd=FASES[G.fase-2];
    if(fd&&fd.info){t.textContent=fd.info.t; tx.textContent=fd.info.txt;}
    btn.textContent='Próxima fase ▶'; G.popCb=proximaFase;

  } else if(tipo==='gameover'){
    if(G.soloDestruido){
      t.textContent='Solo destruído! ☠️';
      tx.textContent='O uso excessivo de agrotóxicos destruiu o solo.\nSem solo saudável, não há plantação possível.\n\n⚠️ Isso acontece de verdade na agricultura.';
    } else if(G.soloSaude<40){
      t.textContent='Roça destruída! ☠️';
      tx.textContent='As pragas venceram — e o solo estava fraco\npelo uso de químicos, atraindo ainda mais pragas.\n\nO método natural preserva o ciclo da terra.';
    } else {
      t.textContent='Plantação perdida!';
      tx.textContent='As pragas foram rápidas demais!\n\nDica: solo saudável → menos pragas.\nUse o modo natural e preserve sua roça.';
    }
    tx.textContent+=`\n\n⭐ ${G.pontos} pts · Solo: ${Math.round(G.soloSaude)}% · Químico: ${G.usoQuimico}x`;
    btn.textContent='↺ Tentar novamente'; G.popCb=reiniciar;

  } else if(tipo==='vitoria'){
    const pctQui=G.usoQuimico/(G.usoNatural+G.usoQuimico+0.001);
    let msg,titulo;
    if(pctQui<0.15){
      titulo='Vitória Sustentável! 🌱';
      msg='Você preservou o solo e venceu de forma sustentável!\nSua roça vai produzir por muitas gerações.';
    } else if(pctQui<0.5){
      titulo='Vitória com custo! ⚖️';
      msg='Você venceu, mas o solo sofreu com os químicos.\nAlgumas pragas apareceram por causa disso.';
    } else {
      titulo='Vitória pírica... ⚠️';
      msg='Você venceu — mas o solo está comprometido.\nA alta produção de hoje ameaça a produção de amanhã.';
    }
    t.textContent=titulo;
    tx.textContent=`${msg}\n\n⭐ ${G.pontos} pts · Solo: ${Math.round(G.soloSaude)}%\n🌿 Natural: ${G.usoNatural}x · 🧪 Químico: ${G.usoQuimico}x`;
    btn.textContent='↺ Jogar novamente'; G.popCb=reiniciar;
  }
}

function fecharPopup(){
  document.getElementById('popup').style.display='none';
  if(G.popCb){G.popCb(); G.popCb=null;}
}

function banner(titulo,sub,dur=2800){
  const b=document.getElementById('fbanner');
  document.getElementById('fbt').textContent=titulo;
  document.getElementById('fbs').textContent=sub;
  b.classList.add('show');

function concluirFase(){
  if(G.tela!=='jogo') return;
  G.tela='fasecompleta';
  if(G.fase>=4){
    G.tela='vitoria'; SFX.win();
    setTimeout(()=>mostrarPopup('vitoria'),500); return;
  }
  SFX.lvl();
  const fd=FASES[G.fase-1];
  if(fd&&fd.info) mostrarPopup('fasecompleta');
  else{G.fase++; setTimeout(proximaFase,400);}
}

function proximaFase(){
  document.getElementById('popup').style.display='none';
  G.fase++;
  G.pragas=[];G.parts=[];G.floats=[];
  G.elimTotal=0;G.spawnT=0;G.dificT=0;
  G.soloWarnJaEmitido=false;
  const fd=FASES[G.fase-1];
  G.vel=fd.vb; G.spawnInt=fd.si;
  G.tela='jogo'; atualizarHUD();
  banner(fd.nome,fd.sub);
}

  G.pragas=[];G.parts=[];G.floats=[];

  G.shakeX=0;G.shakeY=0;G.shakeTick=0;G.flashA=0;

}

C.addEventListener('mousemove',e=>{

  G.my=(e.clientY-r.top)*(560/r.height);
  // cursor: none só no jogo, seta na tela inicial
  if(G.tela==='inicio'){
    // sobre o botão → pointer, fora → default
    const sobreBtn=G.mx>278&&G.mx<522&&G.my>406&&G.my<458;

  } else {
    C.style.cursor='none';
  }
});
C.addEventListener('mousedown',e=>{
  G.click=true; AC.resume();
  const r=C.getBoundingClientRect();
  const cx=(e.clientX-r.left)*(800/r.width);
  const cy=(e.clientY-r.top)*(560/r.height);
  if(G.tela==='inicio'&&cx>278&&cx<522&&cy>390&&cy<442) iniciarJogo();

C.addEventListener('mouseleave',()=>G.click=false);

// LOOP
// ════════════════════════════════════════════════════════════════
function loop(){
  G.tick++;
  updShake(); updFlash(); tickDific(); tickSolo();
  ctx.save(); ctx.translate(G.shakeX,G.shakeY);
  ctx.clearRect(-12,-12,824,584);
  drawBg();
  if(G.tela==='inicio'){
    drawInicio();
  } else {
    G.pragas.forEach(drawPraga);
    updDrawParts(); updDrawFloats(); drawCursor();
    if(G.tela==='jogo') updPragas();
    if(G.tela==='gameover') drawGameOverCv();
    if(G.tela==='vitoria') drawVitoriaCv();
  }
  ctx.restore();
  if(G.flashA>0){
    ctx.fillStyle=G.flashC; ctx.globalAlpha=G.flashA;
    ctx.fillRect(0,0,800,560); ctx.globalAlpha=1;
  }
  updFlash();
  requestAnimationFrame(loop);
}

atualizarHUD();
loop();
</script>
